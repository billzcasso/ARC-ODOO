repos:
  # Formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: ["--line-length=120"]
        files: ^addons/.*\.py$

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=120"]
        files: ^addons/.*\.py$

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--ignore=E501,W503,E203"]
        files: ^addons/.*\.py$

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^addons/
      - id: end-of-file-fixer
        files: ^addons/
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements
        files: ^addons/.*\.py$

  # Run Tier 1 tests before commit
  - repo: local
    hooks:
      - id: pytest-tier1
        name: pytest (Tier 1)
        entry: python -m pytest tests/ --ignore=tests/odoo_tests -q --tb=line
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
