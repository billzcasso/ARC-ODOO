name: ARC-ODOO Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "addons/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main, develop]
    paths:
      - "addons/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  tier1-tests:
    name: Tier 1 — Standalone Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytz

      - name: Run Tier 1 tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/odoo_tests \
            -v --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  manifest-audit:
    name: Manifest & Structure Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytz

      - name: Run manifest audit
        run: |
          python -m pytest tests/test_manifest_audit.py -v --tb=short
